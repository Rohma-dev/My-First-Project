<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Advanced Task Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-[#090d16] text-slate-300 min-h-screen p-4 md:p-12 relative overflow-x-hidden">

    <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-purple-600/10 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-cyan-600/10 rounded-full blur-[120px] pointer-events-none"></div>

    <div class="max-w-4xl mx-auto space-y-8 relative z-10">
        
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-slate-900/40 border border-slate-800/80 p-6 rounded-2xl backdrop-blur-md">
            <div>
                <h1 class="text-2xl md:text-3xl font-extrabold text-white tracking-tight">NEXUS COMMAND</h1>
                <p class="text-sm text-slate-400">Local Storage Synced Live Frontend Database Matrix</p>
            </div>
            <div class="flex items-center gap-2 bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-4 py-1.5 rounded-full text-xs font-mono font-bold">
                <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span> SYSTEM ACTIVE
            </div>
        </header>

        <div class="grid md:grid-cols-3 gap-8">
            
            <div class="bg-slate-900/60 border border-slate-800/80 p-6 rounded-2xl h-fit space-y-5 backdrop-blur-md">
                <h3 class="text-white font-bold text-lg tracking-wide border-b border-slate-800 pb-2">CREATE TASK</h3>
                <form id="taskForm" class="space-y-4">
                    <div class="space-y-2">
                        <label class="text-xs font-bold uppercase tracking-wider text-slate-400">Task Title</label>
                        <input type="text" id="taskTitle" required placeholder="Ex: Deploy Cloud Infrastructure" 
                               class="w-full bg-[#05070c] border border-slate-800 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-cyan-500 transition duration-200">
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold uppercase tracking-wider text-slate-400">Priority Vector</label>
                        <select id="taskPriority" class="w-full bg-[#05070c] border border-slate-800 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-cyan-500 transition duration-200">
                            <option value="High">🔴 High Priority</option>
                            <option value="Medium">🟡 Medium Priority</option>
                            <option value="Low">🟢 Low Priority</option>
                        </select>
                    </div>
                    <button type="submit" class="w-full bg-gradient-to-r from-cyan-500 to-purple-600 hover:shadow-[0_0_25px_rgba(6,182,212,0.3)] text-slate-950 font-extrabold py-3.5 rounded-xl transition duration-300 text-sm tracking-wider uppercase">
                        Save To Database +
                    </button>
                </form>
            </div>

            <div class="md:grid-cols-1 md:col-span-2 space-y-4">
                <div class="flex justify-between items-center bg-slate-900/20 p-2 px-4 rounded-xl border border-slate-800/30">
                    <h3 class="text-white font-bold tracking-wide text-sm uppercase text-slate-400">Live Engine Stream</h3>
                    <span id="taskCount" class="text-xs bg-slate-800 px-2.5 py-1 rounded-md text-cyan-400 font-mono">0 Tasks Loaded</span>
                </div>

                <div id="tasksContainer" class="space-y-3">
                    </div>
            </div>

        </div>

    </div>

    <script>
        const taskForm = document.getElementById('taskForm');
        const tasksContainer = document.getElementById('tasksContainer');
        const taskCount = document.getElementById('taskCount');

        // LocalStorage se data load karne ka function
        function loadTasks() {
            tasksContainer.innerHTML = '';
            
            // Database se items nikalna, agar khali ho to empty array [] dena
            let tasks = JSON.parse(localStorage.getItem('nexus_tasks')) || [];
            
            taskCount.innerText = `${tasks.length} Tasks Loaded`;
            
            if(tasks.length === 0) {
                tasksContainer.innerHTML = `<div class="text-center py-12 border border-dashed border-slate-800 rounded-2xl text-slate-500 text-sm">Database Matrix is empty. Create a task!</div>`;
                return;
            }

            tasks.forEach((task, index) => {
                let badgeColor = "bg-green-500/10 text-green-400 border-green-500/20";
                if(task.priority === "High") badgeColor = "bg-rose-500/10 text-rose-400 border-rose-500/20";
                if(task.priority === "Medium") badgeColor = "bg-amber-500/10 text-amber-400 border-amber-500/20";

                const taskRow = document.createElement('div');
                taskRow.className = "bg-slate-900/40 border border-slate-800/60 p-5 rounded-xl flex justify-between items-center hover:border-slate-700/80 transition duration-200 group";
                taskRow.innerHTML = `
                    <div class="space-y-2">
                        <h4 class="text-white font-semibold text-base group-hover:text-cyan-400 transition duration-200">${task.title}</h4>
                        <span class="inline-block text-[10px] font-bold px-2.5 py-0.5 rounded border uppercase tracking-wider ${badgeColor}">${task.priority}</span>
                    </div>
                    <button onclick="deleteTask(${index})" class="text-xs bg-slate-800/50 hover:bg-rose-500/20 border border-slate-700/60 hover:border-rose-500/40 text-slate-400 hover:text-rose-400 px-3 py-2 rounded-lg transition duration-200 font-medium">
                        Delete 🗑️
                    </button>
                `;
                tasksContainer.appendChild(taskRow);
            });
        }

        // Naya task save karne ka function
        taskForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const title = document.getElementById('taskTitle').value;
            const priority = document.getElementById('taskPriority').value;

            let tasks = JSON.parse(localStorage.getItem('nexus_tasks')) || [];
            tasks.push({ title, priority });

            // Updated list ko wapas database (LocalStorage) mein bhej dena
            localStorage.setItem('nexus_tasks', JSON.stringify(tasks));
            
            document.getElementById('taskTitle').value = ''; // Input clear karein
            loadTasks(); // UI refresh
        });

        // Task delete karne ka function
        function deleteTask(index) {
            let tasks = JSON.parse(localStorage.getItem('nexus_tasks')) || [];
            tasks.splice(index, 1); // Specific index wala task remove karein
            
            localStorage.setItem('nexus_tasks', JSON.stringify(tasks));
            loadTasks(); // UI refresh
        }

        // Initially load storage components on start
        loadTasks();
    </script>
</body>
</html>

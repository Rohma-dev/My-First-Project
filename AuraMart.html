<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛍️ AuraMart | Premium Minimalist Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .heading-font { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="bg-[#f8f9fa] text-slate-800 min-h-screen antialiased">

    <header class="sticky top-0 z-40 bg-white shadow-xs border-b border-gray-200">
        <div class="max-w-6xl mx-auto px-4 md:px-6 h-20 flex items-center justify-between">
            <a href="#" onclick="navigateToPage('all')" class="heading-font font-bold text-2xl tracking-tight text-gray-900 flex items-center gap-2">
                <span class="w-10 h-10 rounded-xl bg-gray-900 flex items-center justify-center text-white text-base shadow-sm">AM</span>
                Aura<span class="text-gray-500">Mart.</span>
            </a>

            <div class="bg-gray-100 p-1.5 rounded-xl flex gap-1 text-xs md:text-sm font-bold text-gray-600 border border-gray-200">
                <button id="tab-all" onclick="navigateToPage('all')" class="px-4 py-2 bg-white text-gray-900 rounded-lg shadow-xs transition-all">✨ All Products</button>
                <button id="tab-tech" onclick="navigateToPage('tech')" class="px-4 py-2 hover:text-gray-900 rounded-lg transition-all text-gray-500">💻 Electronics</button>
                <button id="tab-fashion" onclick="navigateToPage('fashion')" class="px-4 py-2 hover:text-gray-900 rounded-lg transition-all text-gray-500">👟 Apparel</button>
            </div>

            <button class="p-2 bg-white border border-gray-200 text-gray-700 rounded-xl font-bold text-sm flex items-center gap-2 shadow-xs hover:bg-gray-50 transition-all">
                <span>🛒</span>
                <span id="globalBagCount" class="bg-gray-900 text-white text-xs px-2 py-0.5 rounded-md">0</span>
            </button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 md:px-6 py-8 space-y-8">
        
        <div id="dynamicHeroBanner" class="bg-white border border-gray-200 rounded-2xl p-6 md:p-8 text-gray-800 shadow-xs transition-all duration-300">
            <span class="text-[10px] font-bold tracking-widest text-gray-400 uppercase block mb-2">Premium Curation</span>
            <h2 id="bannerHeading" class="text-xl md:text-3xl font-extrabold heading-font tracking-tight text-gray-900">Upgrade Your Daily Dynamic Setup</h2>
            <p id="bannerSubtext" class="text-xs md:text-sm text-gray-500 mt-2 max-w-md opacity-90 leading-relaxed">Explore authentic tech widgets and luxury wearables premium items carefully curated for excellence.</p>
        </div>

        <div>
            <div class="flex items-center justify-between mb-6 border-b border-gray-200 pb-4">
                <h3 id="sectionTitleLabel" class="text-gray-900 font-extrabold text-lg md:text-xl heading-font tracking-tight">Viewing All Master Products</h3>
                <span id="productCounterBadge" class="text-xs bg-gray-200 border border-gray-300 text-gray-700 font-bold px-3 py-1 rounded-full">6 Items Available</span>
            </div>
            
            <div id="productsDisplayGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
        </div>

    </main>

    <footer class="max-w-6xl mx-auto px-4 md:px-6 py-8 border-t border-gray-200 mt-12 text-center text-xs text-gray-400 font-medium">
        <p>© 2026 AuraMart Secure Grid Platform. Powered by Rohma Noor. All Rights Reserved.</p>
    </footer>

    <script>
        // Local Products Matrix Database Array
        const globalProductsDatabase = [
            { id: 1, category: "tech", name: "Aura Pods Neon Max", price: 129.00, icon: "🎧", desc: "Wireless active sound canceling audio pods node stream." },
            { id: 2, category: "tech", name: "Quantum Fit Smartwatch", price: 245.00, icon: "⌚", desc: "AMOLED biometric heart monitor active tracker sync matrix." },
            { id: 3, category: "fashion", name: "Cyber Pulse Retro Sneakers", price: 89.00, icon: "👟", desc: "Ultra comfort breathable performance mesh sports apparel." },
            { id: 4, category: "tech", name: "Apex Pro Mechanical Keyboard", price: 159.00, icon: "⌨️", desc: "Hot-swappable RGB custom linear switch dynamic keyboard." },
            { id: 5, category: "fashion", name: "Vanguard Tech Backpack", price: 75.00, icon: "🎒", desc: "Waterproof secure compartmental layout utility travel bag." },
            { id: 6, category: "fashion", name: "Classic Cobalt Leather Wallet", price: 42.00, icon: "💼", desc: "Genuine secure minimal pocket card holder cluster storage." }
        ];

        let internalBagCounter = 0;

        // Core Page Router / Component Switcher Logic
        function navigateToPage(targetPageKey) {
            const gridContainer = document.getElementById("productsDisplayGrid");
            const banner = document.getElementById("dynamicHeroBanner");
            const heading = document.getElementById("bannerHeading");
            const subtext = document.getElementById("bannerSubtext");
            const sectionLabel = document.getElementById("sectionTitleLabel");
            const countBadge = document.getElementById("productCounterBadge");

            if(!gridContainer) return;
            gridContainer.innerHTML = "";

            // Step 1: Filter correct products based on the target page route
            const filteredSet = targetPageKey === "all" ? globalProductsDatabase : globalProductsDatabase.filter(p => p.category === targetPageKey);
            
            // Step 2: Dynamically shift text headings based on selected route (Keeping clean gray background)
            if (targetPageKey === "all") {
                heading.innerText = "Upgrade Your Daily Dynamic Setup";
                subtext.innerText = "Explore authentic tech widgets and luxury wearables premium items carefully curated for excellence.";
                sectionLabel.innerText = "Viewing All Master Products";
            } 
            else if (targetPageKey === "tech") {
                heading.innerText = "Next-Gen Electronics Department";
                subtext.innerText = "Discover microcomputing parts, intelligent audio tech, and tactile mechanical workstation accessories.";
                sectionLabel.innerText = "Premium Electronics Catalog";
            } 
            else if (targetPageKey === "fashion") {
                heading.innerText = "Apparel & Luxury Urban Wearables";
                subtext.innerText = "Upgrade your lifestyle aesthetics with heavy duty travel gear and athletic footwear vectors.";
                sectionLabel.innerText = "Apparel & Accessories Ledger";
            }

            countBadge.innerText = `${filteredSet.length} Items Available`;

            // Step 3: Loop and inject filtered product items seamlessly (White & Gray theme)
            filteredSet.forEach(product => {
                gridContainer.innerHTML += `
                    <div class="bg-white border border-gray-200 p-5 rounded-2xl shadow-xs hover:shadow-sm hover:border-gray-400 transition-all flex flex-col justify-between group">
                        <div>
                            <div class="w-12 h-12 bg-gray-50 border border-gray-200 rounded-xl flex items-center justify-center text-2xl group-hover:bg-gray-100 transition-all duration-300 mb-4">${product.icon}</div>
                            <h4 class="text-gray-900 font-bold text-base tracking-tight">${product.name}</h4>
                            <p class="text-xs text-gray-400 mt-1 leading-relaxed">${product.desc}</p>
                        </div>
                        <div class="mt-6 pt-4 border-t border-gray-100 flex items-center justify-between">
                            <span class="text-gray-900 font-extrabold text-lg">$${product.price.toFixed(2)}</span>
                            <button onclick="triggerLocalBagOrder()" class="bg-gray-900 hover:bg-gray-800 text-white font-bold px-4 py-2 rounded-xl text-xs transition-all uppercase tracking-wide">Buy Now 🛒</button>
                        </div>
                    </div>`;
            });

            // Step 4: Adjust Active Visual Menu Tabs State Highlighting (White/Black Minimal)
            const tabs = ["all", "tech", "fashion"];
            tabs.forEach(tab => {
                const btn = document.getElementById(`tab-${tab}`);
                if(tab === targetPageKey) {
                    btn.className = "px-4 py-2 bg-white text-gray-900 rounded-lg shadow-xs transition-all border border-gray-200/60";
                } else {
                    btn.className = "px-4 py-2 hover:text-gray-900 rounded-lg transition-all text-gray-400";
                }
            });
        }

        // Simulative shopping bag increment logic
        function triggerLocalBagOrder() {
            internalBagCounter += 1;
            document.getElementById("globalBagCount").innerText = internalBagCounter;
        }

        // Default initialization bootstrap step on browser runtime execution load
        window.onload = function() {
            navigateToPage('all');
        }
    </script>
</body>
</html>

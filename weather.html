<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Weather App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1f4068 0%, #162447 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .weather-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            color: white;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        input {
            flex: 1;
            padding: 12px 20px;
            border: none;
            outline: none;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 1rem;
        }
        input::placeholder {
            color: #ddd;
        }
        button {
            background: #e43f5a;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover {
            background: #ff4a68;
        }
        .weather-info {
            display: block;
        }
        .city {
            font-size: 2rem;
            font-weight: 500;
            margin-bottom: 5px;
        }
        .temp {
            font-size: 4rem;
            font-weight: 700;
            margin: 15px 0;
        }
        .status {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #00fff0;
            margin-bottom: 30px;
        }
        .details {
            display: flex;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 15px;
        }
        .col {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 50%;
        }
        .col:first-child {
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }
        .label {
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 5px;
        }
        .value {
            font-size: 1.1rem;
            font-weight: bold;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="weather-card">
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter City Name...">
            <button onclick="getWeather()">Search</button>
        </div>
        
        <div class="weather-info" id="weatherInfo">
            <div class="city" id="cityName">Lahore</div>
            <div class="temp" id="tempValue">32°C</div>
            <div class="status" id="weatherStatus">Sunny</div>
            
            <div class="details">
                <div class="col">
                    <span class="label">Humidity</span>
                    <span class="value" id="humidityValue">45%</span>
                </div>
                <div class="col">
                    <span class="label">Wind Speed</span>
                    <span class="value" id="windValue">12 km/h</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function getWeather() {
            let city = document.getElementById('cityInput').value.trim();
            if(city === "") {
                alert("Please enter a city name!");
                return;
            }

            let cityName = document.getElementById('cityName');
            let tempValue = document.getElementById('tempValue');
            let weatherStatus = document.getElementById('weatherStatus');
            let humidityValue = document.getElementById('humidityValue');
            let windValue = document.getElementById('windValue');

            let dummyData = {
                "lahore": { temp: "36°C", status: "Sunny ☀️", humidity: "40%", wind: "10 km/h" },
                "karachi": { temp: "30°C", status: "Humid ☁️", humidity: "75%", wind: "22 km/h" },
                "islamabad": { temp: "26°C", status: "Rainy 🌧️", humidity: "65%", wind: "14 km/h" },
                "gujranwala": { temp: "34°C", status: "Hot 🔥", humidity: "42%", wind: "8 km/h" },
                "london": { temp: "15°C", status: "Cloudy ☁️", humidity: "80%", wind: "18 km/h" },
                "new york": { temp: "22°C", status: "Clear Sky 🌤️", humidity: "50%", wind: "15 km/h" }
            };

            let searchKey = city.toLowerCase();

            if(dummyData[searchKey]) {
                cityName.innerHTML = city.charAt(0).toUpperCase() + city.slice(1);
                tempValue.innerHTML = dummyData[searchKey].temp;
                weatherStatus.innerHTML = dummyData[searchKey].status;
                humidityValue.innerHTML = dummyData[searchKey].humidity;
                windValue.innerHTML = dummyData[searchKey].wind;
            } else {
                cityName.innerHTML = city.charAt(0).toUpperCase() + city.slice(1);
                tempValue.innerHTML = "28°C";
                weatherStatus.innerHTML = "Pleasant 🌤️";
                humidityValue.innerHTML = "55%";
                windValue.innerHTML = "11 km/h";
            }
        }
    </script>
</body>
</html>

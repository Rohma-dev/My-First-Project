<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Todo List</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .todo-box {
            background: white;
            width: 100%;
            max-width: 450px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h2 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }
        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
        }
        input:focus {
            border-color: #667eea;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
        }
        button:hover {
            background: #5a6fd6;
        }
        ul {
            list-style: none;
        }
        li {
            background: #f7fafc;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #667eea;
        }
        .delete-btn {
            background: #e53e3e;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.8rem;
        }
        .delete-btn:hover {
            background: #c53030;
        }
    </style>
</head>
<body>

    <div class="todo-box">
        <h2>My Todo List</h2>
        <div class="input-area">
            <input type="text" id="taskInput" placeholder="Naya kaam likhein...">
            <button onclick="addTask()">Add</button>
        </div>
        <ul id="taskList"></ul>
    </div>

    <script>
        function addTask() {
            let input = document.getElementById('taskInput');
            let taskText = input.value.trim();
            
            if(taskText === "") {
                alert("Pehle kuch likhein!");
                return;
            }

            let ul = document.getElementById('taskList');
            let li = document.createElement('li');
            
            li.innerHTML = `<span>${taskText}</span> <button class="delete-btn" onclick="this.parentElement.remove()">Delete</button>`;
            
            ul.appendChild(li);
            input.value = "";
        }
    </script>
</body>
</html>

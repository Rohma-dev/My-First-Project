<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galactic Knowledge Odyssey</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #020208;
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #00f2ff;
            overflow: hidden;
            position: relative;
        }

        /* Animated Starfield Background */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Futuristic Neon Glass Container */
        .universe-box {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 650px;
            background: rgba(6, 6, 22, 0.75);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 242, 255, 0.25);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.15), inset 0 0 20px rgba(0, 242, 255, 0.05);
            transition: all 0.4s ease;
        }

        /* Top Bar Indicators */
        .hud-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px dashed rgba(0, 242, 255, 0.2);
            padding-bottom: 15px;
        }

        .hud-title {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.4rem;
            letter-spacing: 3px;
            text-shadow: 0 0 10px #00f2ff;
            background: linear-gradient(45deg, #00f2ff, #9d4edd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hud-timer {
            font-family: 'Orbitron', sans-serif;
            background: rgba(255, 0, 92, 0.1);
            border: 1px solid #ff005c;
            color: #ff005c;
            padding: 6px 16px;
            border-radius: 6px;
            font-weight: 700;
            text-shadow: 0 0 8px #ff005c;
            box-shadow: 0 0 10px rgba(255, 0, 92, 0.2);
        }

        /* Level Matrix (Progress Dots) */
        .matrix-dots {
            display: flex;
            gap: 10px;
            margin-bottom: 35px;
            justify-content: center;
        }

        .dot {
            width: 35px;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            transition: all 0.3s ease;
        }

        .dot.active {
            background: #00f2ff;
            box-shadow: 0 0 10px #00f2ff;
        }

        .dot.passed {
            background: #9d4edd;
            box-shadow: 0 0 10px #9d4edd;
        }

        /* Question Command Center */
        .hud-question {
            font-size: 1.5rem;
            font-weight: 600;
            color: #fff;
            line-height: 1.4;
            margin-bottom: 30px;
            text-shadow: 0 0 5px rgba(255,255,255,0.2);
        }

        /* Cyberpunk Grid Options */
        .grid-options {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            margin-bottom: 30px;
        }

        .opt-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(0, 242, 255, 0.15);
            padding: 18px 25px;
            border-radius: 12px;
            color: #b0b0d0;
            font-size: 1.15rem;
            font-weight: 600;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .opt-card:hover {
            background: rgba(0, 242, 255, 0.05);
            color: #00f2ff;
            border-color: #00f2ff;
            transform: translateX(5px);
            box-shadow: -5px 0 15px rgba(0, 242, 255, 0.2);
        }

        /* Selection Status Modifications */
        .opt-card.correct {
            background: rgba(0, 255, 136, 0.1) !important;
            border-color: #00ff88 !important;
            color: #00ff88 !important;
            text-shadow: 0 0 10px rgba(0,255,136,0.4);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }

        .opt-card.wrong {
            background: rgba(255, 0, 92, 0.1) !important;
            border-color: #ff005c !important;
            color: #ff005c !important;
            text-shadow: 0 0 10px rgba(255,0,92,0.4);
            box-shadow: 0 0 20px rgba(255, 0, 92, 0.2);
        }

        .opt-card.disabled {
            pointer-events: none;
            opacity: 0.5;
        }
        .opt-card.disabled.correct { opacity: 1; }

        /* Next Vector Button */
        .next-vector-btn {
            font-family: 'Orbitron', sans-serif;
            width: 100%;
            background: linear-gradient(90deg, #9d4edd, #00f2ff);
            color: #020208;
            border: none;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 900;
            letter-spacing: 2px;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(10px);
            pointer-events: none;
        }

        .next-vector-btn.active {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .next-vector-btn:hover {
            box-shadow: 0 0 30px #00f2ff;
            letter-spacing: 4px;
        }

        /* Terminal Results Screen */
        .terminal-results {
            display: none;
            text-align: center;
        }

        .rank-badge {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px #9d4edd;
        }

        .rank-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            color: #fff;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .data-stream {
            font-size: 1.2rem;
            color: #b0b0d0;
            margin-bottom: 35px;
        }

        .data-stream span {
            color: #00f2ff;
            font-weight: bold;
            font-size: 1.6rem;
        }
    </style>
</head>
<body>

    <canvas id="starfield"></canvas>

    <div class="universe-box">
        <div id="quiz-panel">
            <div class="hud-header">
                <div class="hud-title">MISSION CONTROL</div>
                <div class="hud-timer">T-MINUS: <span id="timer-sec">15</span>s</div>
            </div>

            <div class="matrix-dots" id="matrix-wrapper">
                </div>

            <div class="hud-question" id="quest-field">Initializing transmission...</div>

            <div class="grid-options" id="options-wrapper">
                </div>

            <button class="next-vector-btn" id="next-v-btn" onclick="nextTransmission()">NEXT TRANSMISSION 🚀</button>
        </div>

        <div id="results-panel" class="terminal-results">
            <div class="rank-badge" id="r-badge">🚀</div>
            <div class="rank-title" id="r-title">GALACTIC EXPLORER</div>
            <div class="data-stream">Sync Complete. Accuracy Matrix: <span><span id="r-score">0</span> / 5</span></div>
            <button class="next-vector-btn active" onclick="rebootMission()">REBOOT MISSION 🔄</button>
        </div>
    </div>

    <script>
        // Starfield Core Engine Animation
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        for(let i=0; i<120; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 1.5,
                speed: Math.random() * 0.5 + 0.1
            });
        }

        function animateStars() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "rgba(255,255,255,0.8)";
            stars.forEach(star => {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.radius, 0, Math.PI*2);
                ctx.fill();
                star.y += star.speed;
                if(star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
            });
            requestAnimationFrame(animateStars);
        }
        animateStars();

        // Audio Frequency Synthesizer (Bina kisi audio file ke, browser se digital sounds paida karne ke liye)
        function playBeep(freq, type, duration) {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = type;
            oscillator.frequency.value = freq;
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + duration);
        }

        // Space Knowledge Mission Data Matrix
        const missionData = [
            { q: "Which planet in our solar system is scientifically known to rotate backwards (Clockwise)?", opts: ["Mars", "Venus", "Jupiter", "Neptune"], ans: 1 },
            { q: "What is the coordinate boundary point around a Black Hole where nothing can escape?", opts: ["Singularity", "Dark Matter Edge", "Event Horizon", "Nebula Core"], ans: 2 },
            { q: "Which cosmic element makes up roughly 27% of the observable universe structure?", opts: ["Dark Matter", "Stellar Hydrogen", "Cosmic Dust", "Anti-matter"], ans: 0 },
            { q: "What is the approximate age of our universe based on cosmic background light?", opts: ["4.6 Billion Years", "13.8 Billion Years", "20.1 Billion Years", "95 Billion Years"], ans: 1 },
            { q: "Which telescope was deployed into orbit to capture deep field infrared space views?", opts: ["Hubble", "Kepler", "James Webb", "Voyager 1"], ans: 2 }
        ];

        let index = 0;
        let score = 0;
        let clock = 15;
        let interval;

        // UI Initialization Linkers
        function bootMission() {
            index = 0;
            score = 0;
            document.getElementById('quiz-panel').style.display = 'block';
            document.getElementById('results-panel').style.display = 'none';
            
            // Build Matrix Dots Dynamically
            const wrapper = document.getElementById('matrix-wrapper');
            wrapper.innerHTML = '';
            missionData.forEach(() => {
                let d = document.createElement('div');
                d.classList.add('dot');
                wrapper.appendChild(d);
            });
            
            loadTransmission();
        }

        function loadTransmission() {
            clearInterval(interval);
            document.getElementById('next-v-btn').classList.remove('active');
            
            // Update dots state matrix
            let dots = document.querySelectorAll('.dot');
            dots.forEach((d, idx) => {
                d.className = 'dot';
                if(idx < index) d.classList.add('passed');
                if(idx === index) d.classList.add('active');
            });

            let current = missionData[index];
            document.getElementById('quest-field').innerText = current.q;
            
            const optWrapper = document.getElementById('options-wrapper');
            optWrapper.innerHTML = '';
            
            current.opts.forEach((o, i) => {
                let card = document.createElement('button');
                card.classList.add('opt-card');
                card.innerText = `${i+1}. ${o}`;
                card.addEventListener('click', () => triggerEvaluation(i, card));
                optWrapper.appendChild(card);
            });

            startClock();
        }

        function triggerEvaluation(selected, cardElement) {
            clearInterval(interval);
            let correct = missionData[index].ans;
            let cards = document.querySelectorAll('.opt-card');

            if(selected === correct) {
                cardElement.classList.add('correct');
                playBeep(880, 'sine', 0.15); // High positive beep
                score++;
            } else {
                cardElement.classList.add('wrong');
                cards[correct].classList.add('correct');
                playBeep(220, 'sawtooth', 0.3); // Deep error buzz
            }

            cards.forEach(c => c.classList.add('disabled'));
            document.getElementById('next-v-btn').classList.add('active');
        }

        function startClock() {
            clock = 15;
            document.getElementById('timer-sec').innerText = clock;
            interval = setInterval(() => {
                clock--;
                document.getElementById('timer-sec').innerText = clock;
                if(clock <= 0) {
                    clearInterval(interval);
                    playBeep(180, 'triangle', 0.4);
                    let correct = missionData[index].ans;
                    let cards = document.querySelectorAll('.opt-card');
                    cards[correct].classList.add('correct');
                    cards.forEach(c => c.classList.add('disabled'));
                    document.getElementById('next-v-btn').classList.add('active');
                }
            }, 1000);
        }

        function nextTransmission() {
            index++;
            if(index < missionData.length) {
                playBeep(600, 'sine', 0.05);
                loadTransmission();
            } else {
                terminateAndShowResults();
            }
        }

        function terminateAndShowResults() {
            document.getElementById('quiz-panel').style.display = 'none';
            document.getElementById('results-panel').style.display = 'block';
            
            document.getElementById('r-score').innerText = score;
            
            const badge = document.getElementById('r-badge');
            const title = document.getElementById('r-title');

            if(score === 5) {
                badge.innerText = "👑";
                title.innerText = "GALACTIC EMPEROR";
                playBeep(523.25, 'sine', 0.1); setTimeout(() => playBeep(659.25, 'sine', 0.1), 100); setTimeout(() => playBeep(783.99, 'sine', 0.3), 200);
            } else if(score >= 3) {
                badge.innerText = "🎖️";
                title.innerText = "STAR COMMANDER";
                playBeep(587.33, 'sine', 0.1); setTimeout(() => playBeep(783.99, 'sine', 0.2), 120);
            } else {
                badge.innerText = "👨‍🚀";
                title.innerText = "SPACE CADET";
                playBeep(293.66, 'triangle', 0.4);
            }
        }

        bootMission();
    </script>
</body>
</html>

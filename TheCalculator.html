<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            padding: 20px;
        }
        .calculator {
            width: 100%;
            max-width: 360px;
            background-color: #000000;
            padding: 25px;
            border-radius: 32px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }
        .display {
            width: 100%;
            height: 100px;
            background-color: transparent;
            border: none;
            outline: none;
            text-align: right;
            font-size: 3.5rem;
            color: #ffffff;
            padding: 10px;
            margin-bottom: 20px;
            font-weight: 300;
            overflow-x: auto;
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }
        button {
            height: 65px;
            width: 65px;
            border-radius: 50%;
            border: none;
            outline: none;
            font-size: 1.6rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            margin: auto;
        }
        button:active {
            transform: scale(0.92);
            filter: brightness(130%);
        }
        /* Top Row Buttons (A/C, Backspace) */
        .btn-gray {
            background-color: #a5a5a5;
            color: #000000;
        }
        /* Number Buttons */
        .btn-dark {
            background-color: #333333;
            color: #ffffff;
        }
        /* Operator Buttons (+, -, *, /, =) */
        .btn-orange {
            background-color: #ff9f0a;
            color: #ffffff;
        }
        /* Zero button spans 2 columns */
        .btn-zero {
            grid-column: span 2;
            width: 100%;
            border-radius: 35px;
            padding-left: 25px;
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <!-- Input display screen -->
        <input type="text" class="display" id="screen" placeholder="0" readonly>
        
        <div class="buttons">
            <!-- First Row -->
            <button class="btn-gray" onclick="clearScreen()">AC</button>
            <button class="btn-gray" onclick="backspace()">⌫</button>
            <button class="btn-orange" onclick="press('%')">%</button>
            <button class="btn-orange" onclick="press('/')">÷</button>

            <!-- Second Row -->
            <button class="btn-dark" onclick="press('7')">7</button>
            <button class="btn-dark" onclick="press('8')">8</button>
            <button class="btn-dark" onclick="press('9')">9</button>
            <button class="btn-orange" onclick="press('*')">×</button>

            <!-- Third Row -->
            <button class="btn-dark" onclick="press('4')">4</button>
            <button class="btn-dark" onclick="press('5')">5</button>
            <button class="btn-dark" onclick="press('6')">6</button>
            <button class="btn-orange" onclick="press('-')">-</button>

            <!-- Fourth Row -->
            <button class="btn-dark" onclick="press('1')">1</button>
            <button class="btn-dark" onclick="press('2')">2</button>
            <button class="btn-dark" onclick="press('3')">3</button>
            <button class="btn-orange" onclick="press('+')">+</button>

            <!-- Fifth Row -->
            <button class="btn-dark btn-zero" onclick="press('0')">0</button>
            <button class="btn-dark" onclick="press('.')">.</button>
            <button class="btn-orange" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        let screen = document.getElementById('screen');

        function press(value) {
            if (screen.value === '0' && value !== '.') {
                screen.value = value;
            } else {
                screen.value += value;
            }
        }

        function clearScreen() {
            screen.value = '';
        }

        function backspace() {
            screen.value = screen.value.slice(0, -1);
        }

        function calculate() {
            try {
                // automatic calculation logic
                if(screen.value != '') {
                    screen.value = eval(screen.value);
                }
            } catch (error) {
                screen.value = 'Error';
            }
        }
    </script>
</body>
</html>
